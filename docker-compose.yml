version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bitespeed-db
    environment:
      POSTGRES_USER: bitespeed
      POSTGRES_PASSWORD: bitespeed_secret
      POSTGRES_DB: bitespeed
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bitespeed -d bitespeed']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitespeed-app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bitespeed:bitespeed_secret@db:5432/bitespeed?schema=public
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
